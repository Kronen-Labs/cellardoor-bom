name: Publish package to GitHub Packages
on:
  push:
    branches: ["main"]
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.18.0
        with:
          java-version: 25
          java-distribution: temurin
          maven-version: 3.9.11
      - name: Check if version already deployed
        id: check-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          groupId=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.groupId)
          artifactId=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId)
          version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          groupPath=${groupId//./\/}
          url="https://maven.pkg.github.com/$OWNER/$REPO/$groupPath/$artifactId/$version/${artifactId}-${version}.pom"
          echo "Checking $url"
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" "$url" || echo "000")
          first_char=${http_code:0:1}
          if [ "$first_char" = "2" ] || [ "$first_char" = "3" ]; then
            echo "Version $version already exists in repository (HTTP $http_code)."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $version not found (HTTP $http_code). Will deploy."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get current version from pom.xml
        id: get_version
        run: |
          VERSION=$(xmllint --xpath "/*[local-name()='project']/*[local-name()='version']/text()" pom.xml)
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check published version
        id: check_published
        run: |
          GROUP_ID=com.example
          ARTIFACT_ID=my-artifact
          REPO_URL="https://repo1.maven.org/maven2/$(echo $GROUP_ID | tr '.' '/')/$ARTIFACT_ID/maven-metadata.xml"
          LATEST=$(curl -s $REPO_URL | xmllint --xpath "string(//latest)" -)
          echo "Latest published version: $LATEST"
          if [ "$LATEST" = "${{ steps.get_version.outputs.version }}" ]; then
            echo "Version already published!"
            exit 1
          else
            echo "Version not published yet."
          fi
      - name: Publish package
        if: steps.check-version.outputs.exists == 'false'
        run: mvn --batch-mode deploy -Pghrepo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
